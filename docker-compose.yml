services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collab-frontend
    ports:
      - "9090:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collab-backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: collab_db
      DB_USER: collab_user
      DB_PASS: collab_pass
      JWT_SECRET: supersecret123
      USE_HTTP: "true"
      ALLOWED_ORIGINS: "http://localhost:9090"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: collab-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: collab_db
      MYSQL_USER: collab_user
      MYSQL_PASSWORD: collab_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data: