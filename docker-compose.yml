services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collab-frontend
    ports:
      - "9090:9090"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - collab-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collab-backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=collab_db
      - DB_USER=collab_user
      - DB_PASSWORD=collab_pass
      - JWT_SECRET=your_jwt_secret_here
      - ALLOWED_ORIGINS=http://localhost:9090
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - collab-net

  db:
    image: mysql:8.0
    container_name: collab-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: collab_db
      MYSQL_USER: collab_user
      MYSQL_PASSWORD: collab_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - collab-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "collab_user", "-pcollab_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  collab-net:
    driver: bridge

volumes:
  db_data: